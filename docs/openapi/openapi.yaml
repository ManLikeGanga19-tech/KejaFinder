openapi: 3.1.0
info:
  title: KejaFinder API
  version: 1.0.0
  description: |
    **KejaFinder** is a Kenyan real estate platform with a freemium model: users browse listings
    for free and pay via M-Pesa to unlock full contact details, exact address, and caretaker info.
    Agents pay monthly subscriptions to list properties and receive leads.

    ## Authentication
    All protected endpoints require a **Firebase ID token** as a Bearer token:
    ```
    Authorization: Bearer <firebase-id-token>
    ```
    The token is obtained client-side via Firebase Auth (phone OTP or email/password) and verified
    server-side using `firebase-admin`.

    ## M-Pesa Payment Flow
    1. Client generates a UUID v4 `idempotencyKey`
    2. `POST /v1/payments/initiate` → triggers Daraja STK Push → returns `pollUrl`
    3. Client polls `GET /v1/payments/{checkoutRequestId}/status` every 3–5 seconds
    4. Safaricom calls `POST /v1/payments/callback` → BullMQ job created
    5. Worker creates Unlock record, Lead, sends FCM push notifications

    ## Listing Lock / Unlock
    `GET /v1/listings/{id}` checks the `unlocks` table for `(userId, listingId)`.
    Locked response withholds: `address`, `coordinates`, `caretaker.*`, `agent.phone`, `agent.email`.

  contact:
    name: KejaFinder Support
    email: support@kejafinder.co.ke
  license:
    name: Private
servers:
  - url: https://api.kejafinder.co.ke/v1
    description: Production
  - url: https://staging-api.kejafinder.co.ke/v1
    description: Staging
  - url: http://localhost:3001/v1
    description: Local development

tags:
  - name: auth
    description: Firebase token sync and user registration
  - name: users
    description: Consumer profile, saved listings, unlock history
  - name: listings
    description: Property search, map pins, featured carousel, lock/unlock
  - name: areas
    description: Nairobi area intelligence — safety, cost, accessibility, investment
  - name: payments
    description: M-Pesa STK Push, IPN callback, payment history
  - name: agents
    description: Agent registration, KYC, listings CRUD, lead CRM, dashboard
  - name: media
    description: Cloudinary signed upload URLs and asset deletion
  - name: notifications
    description: In-app notifications and FCM push token management
  - name: admin
    description: Listing moderation, agent KYC review, platform stats (admin only)

security:
  - BearerAuth: []

