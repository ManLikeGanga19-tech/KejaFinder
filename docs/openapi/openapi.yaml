components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: |
        Firebase ID token obtained from Firebase Auth client SDK.
        Verified server-side via `firebase-admin.auth().verifyIdToken()`.
